<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyBlue Assistant | Smart Hotel Operations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-hotel"></i>
                <span>SkyBlue</span>
            </div>
            <ul class="nav-links">
                <li class="nav-item active">
                    <i class="fas fa-comment-dots"></i>
                    <span>Assistant</span>
                </li>
                <li class="nav-item">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Reservations</span>
                </li>
                <li class="nav-item">
                    <i class="fas fa-concierge-bell"></i>
                    <span>Services</span>
                </li>
                <li class="nav-item">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Complaints</span>
                </li>
            </ul>
            <div style="margin-top: auto;">
                <li class="nav-item">
                    <i class="fas fa-user-circle"></i>
                    <span>Profile</span>
                </li>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="chat-container">
            <header class="chat-header">
                <div>
                    <h2><span class="status-dot"></span>Hotel Assistant</h2>
                    <p style="font-size: 13px; color: var(--text-muted);">AI-Powered Concierge</p>
                </div>
                <div class="header-actions">
                    <i class="fas fa-search" style="margin-right: 20px; cursor: pointer;"></i>
                    <i class="fas fa-ellipsis-v" style="cursor: pointer;"></i>
                </div>
            </header>

            <div id="chat-messages">
                <div class="message assistant">
                    Hello! Welcome to SkyBlue Hotel. I am your intelligent assistant. How can I help you with your stay today?
                </div>
            </div>

            <div class="chat-input-area">
                <form id="chat-form">
                    <div class="input-wrapper">
                        <input type="text" id="user-input" placeholder="Type your request here (e.g., 'Book a deluxe room' or 'Report an issue')..." autocomplete="off">
                        <button type="submit" id="send-btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="js/apiService.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
